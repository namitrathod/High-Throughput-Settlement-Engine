# Root server config
server.port=8080

# Spring configuration
spring.application.name=settlement-engine

# Database configuration
spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/settlement_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis configuration
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379

# Kafka configuration
spring.kafka.bootstrap-servers=127.0.0.1:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.faang.settlement_engine.dto
spring.kafka.consumer.auto-offset-reset=earliest

# Modern Java features (Phase 4)
spring.threads.virtual.enabled=true

# Logging
logging.level.com.faang.settlement_engine=INFO
logging.level.org.springframework.retry=DEBUG

# HikariCP for high concurrency
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=60000
